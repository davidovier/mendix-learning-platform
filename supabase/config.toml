# Supabase Configuration for Mendix Prep
# https://supabase.com/docs/guides/cli/config

project_id = "mendix-prep"

[auth]
enabled = true
site_url = "https://mendix-prep.vercel.app"
additional_redirect_urls = ["http://localhost:3000", "http://127.0.0.1:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
minimum_password_length = 8

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
max_frequency = "60s"
otp_length = 6
otp_expiry = 3600

# Confirm Signup Email Template
[auth.email.template.confirmation]
subject = "Confirm your Mendix Prep account"
content_path = "./supabase/templates/confirm-signup.html"

# Password Recovery Email Template
[auth.email.template.recovery]
subject = "Reset your Mendix Prep password"
content_path = "./supabase/templates/reset-password.html"

# Magic Link Email Template
[auth.email.template.magic_link]
subject = "Sign in to Mendix Prep"
content_path = "./supabase/templates/magic-link.html"

# Email Change Template
[auth.email.template.email_change]
subject = "Confirm your email change"
content_path = "./supabase/templates/email-change.html"

[auth.sms]
enable_signup = false
enable_confirmations = false
